# 以下国家地区节点筛选 请自行根据机场节点名称修改正则

🇭🇰 香港节点 = url-test,url=http://www.gstatic.com/generate_204,interval=7200,tolerance=100,timeout=5,policy-regex-filter=(?=.*(港|HK|(?i)Hong))^((?!(台湾|日本|新加坡|美国|韩国|狮城|南朝鲜|US|SG|JP|KR|TW|台灣|美國|韓國|獅城)).)*$
🇨🇳 台湾节点 = url-test,url=http://www.gstatic.com/generate_204,interval=7200,tolerance=100,timeout=5,policy-regex-filter=(?=.*(台|TW|(?i)Taiwan))^((?!(港|日|韩|新|美)).)*$
🇺🇸 美国节点 = url-test,url=http://www.gstatic.com/generate_204,interval=7200,tolerance=100,timeout=5,policy-regex-filter=(?=.*(美国|美國|US|洛杉矶|西雅图|(?i)States|American))^((?!(香港|台湾|日本|新加坡|韩国|狮城|南朝鲜|SG|JP|KR|HK|TW|台灣|韓國|獅城)).)*$
🇰🇷 韩国节点 = url-test,url=http://www.gstatic.com/generate_204,interval=7200,tolerance=100,timeout=5,policy-regex-filter=(?=.*(KR|Korea|KOR|首尔|韩|韓|(?i)Korea))^((?!(香港|台湾|新加坡|美国|狮城|南朝鲜|US|SG|HK|TW|台灣|美國|獅城)).)*$
🇷🇺 俄罗斯节点 = url-test,url=http://www.gstatic.com/generate_204,interval=7200,tolerance=100,timeout=5,policy-regex-filter=🇷🇺|俄罗斯|RU|莫斯科|圣彼得堡|喀山|哈尔科夫|乌法|新西伯利亚|下诺夫哥罗德|沃罗涅什
🇬🇧 英国节点 = url-test,url=http://www.gstatic.com/generate_204,interval=7200,tolerance=100,timeout=5,policy-regex-filter=🇬🇧|英国|UK|伦敦|英格兰|伯明翰|泰恩河畔纽卡斯尔|利兹|爱丁堡|格拉斯哥|苏格兰
🇯🇵 日本节点 = url-test,url=http://www.gstatic.com/generate_204,interval=7200,tolerance=100,timeout=5,policy-regex-filter=(?=.*(日本|JP|(?i)Japan))^((?!(香港|台湾|新加坡|美国|韩国|狮城|南朝鲜|US|SG|KR|HK|TW|台灣|美國|韓國|獅城)).)*$
🇸🇬 新加坡节点 = url-test,url=http://www.gstatic.com/generate_204,interval=7200,tolerance=100,timeout=5,policy-regex-filter=(?=.*(新加坡|狮城|SG|(?i)Singapore))^((?!(香港|台湾|日本|美国|韩国|南朝鲜|US|JP|KR|HK|TW|台灣|美國|韓國)).)*$
🇮🇳 印度 = url-test,url=http://www.gstatic.com/generate_204,interval=7200,tolerance=100,timeout=5,policy-regex-filter=🇮🇳|印度|IN|IND|孟买|新德里|高知|Republic of India|India
🇩🇪 德国 = url-test,url=http://www.gstatic.com/generate_204,interval=7200,tolerance=100,timeout=5,policy-regex-filter=🇩🇪|德国|DEU|DE|柏林|慕尼黑|汉堡|科隆|Germany
🇨🇦 加拿大 = url-test,url=http://www.gstatic.com/generate_204,interval=7200,tolerance=100,timeout=5,policy-regex-filter=🇨🇦|加拿大|CA|渥太华
